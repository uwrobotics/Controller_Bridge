name: GTest Sanity Check

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cmake
      run: | 
        cmake -B build -DBUILD_TESTING=ON
        cmake --build build
        ctest --test-dir build
        cd build && ctest && cd ..
        